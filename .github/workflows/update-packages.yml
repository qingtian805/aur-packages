name: Update Packages

on:
  schedule:
    - cron: '23 6,18 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-packages
  cancel-in-progress: true

env:
  GIT_AUTHOR_NAME: "github-actions[bot]"
  GIT_AUTHOR_EMAIL: "github-actions[bot]@users.noreply.github.com"
  AUR_USERNAME: "github-actions[bot]"
  AUR_EMAIL: "github-actions[bot]@users.noreply.github.com"

jobs:
  update:
    name: Detect updates
    runs-on: ubuntu-latest
    outputs:
      changed_packages: ${{ steps.detect.outputs.packages }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install aria2
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 dnsutils

      - name: Resolve cdn-go.cn via Chinese DNS
        run: |
          CHINA_IP=$(dig @119.29.29.29 cdn-go.cn +subnet=118.134.175.0/24 +short | grep -E '^[0-9]' | head -1)
          if [ -z "$CHINA_IP" ]; then
            echo "ERROR: Failed to resolve cdn-go.cn via Chinese DNS"
            exit 1
          fi
          echo "$CHINA_IP cdn-go.cn" | sudo tee -a /etc/hosts
          echo "Resolved cdn-go.cn -> $CHINA_IP"
          getent ahosts cdn-go.cn

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            scripts/pyproject.toml
            scripts/uv.lock

      - name: Sync dependencies and update packages
        working-directory: scripts
        run: |
          uv sync
          uv run main.py --all

      - name: Detect changed packages
        id: detect
        run: |
          CHANGED=()
          for pkg_path in packages/*/; do
            [ -d "$pkg_path" ] || continue
            pkg_name=$(basename "$pkg_path")
            if ! git diff --quiet -- "$pkg_path/PKGBUILD"; then
              CHANGED+=("$pkg_name")
            fi
          done

          if [ ${#CHANGED[@]} -eq 0 ]; then
            echo "packages=[]" >> "$GITHUB_OUTPUT"
          else
            packages=$(printf '%s\n' "${CHANGED[@]}" | jq -R . | jq -s -c .)
            echo "packages=$packages" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload updated PKGBUILDs
        if: steps.detect.outputs.packages != '[]'
        uses: actions/upload-artifact@v7
        with:
          name: pkgbuilds
          path: packages/

  generate-srcinfo:
    name: .SRCINFO (${{ matrix.package }})
    needs: update
    if: needs.update.outputs.changed_packages != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: ${{ fromJson(needs.update.outputs.changed_packages) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download updated PKGBUILDs
        uses: actions/download-artifact@v8
        with:
          name: pkgbuilds
          path: packages/

      - name: Generate .SRCINFO
        uses: awsl1414/archlinux-package-action@main
        with:
          path: packages/${{ matrix.package }}
          flags: ''
          namcap: false
          srcinfo: true

      - name: Prepare .SRCINFO artifact
        run: |
          mkdir -p "tmp/artifact/${{ matrix.package }}"
          cp "packages/${{ matrix.package }}/.SRCINFO" "tmp/artifact/${{ matrix.package }}/"

      - name: Upload .SRCINFO
        uses: actions/upload-artifact@v7
        with:
          name: srcinfo-${{ matrix.package }}
          path: tmp/artifact/
          include-hidden-files: true

  commit:
    name: Commit and push
    needs: [update, generate-srcinfo]
    if: needs.update.outputs.changed_packages != '[]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download updated PKGBUILDs
        uses: actions/download-artifact@v8
        with:
          name: pkgbuilds
          path: packages/

      - name: Download .SRCINFO files
        uses: actions/download-artifact@v8
        with:
          pattern: srcinfo-*
          merge-multiple: true
          path: packages/

      - name: Commit and push
        run: |
          git config user.name "${{ env.GIT_AUTHOR_NAME }}"
          git config user.email "${{ env.GIT_AUTHOR_EMAIL }}"
          git config core.hooksPath .githooks

          git add packages/

          changed='${{ needs.update.outputs.changed_packages }}'
          count=$(echo "$changed" | jq 'length')
          git commit -m "chore: update AUR packages" \
                     -m "Updated ${count} package(s)" \
                     -m "Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

          git push

  push-to-aur:
    name: Push ${{ matrix.package }} to AUR
    needs: [update, commit]
    if: needs.update.outputs.changed_packages != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: ${{ fromJson(needs.update.outputs.changed_packages) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}

      - name: Detect package assets
        id: assets
        run: |
          assets=""
          for file in packages/${{ matrix.package }}/* packages/${{ matrix.package }}/.*; do
            basename=$(basename "$file")
            [ "$basename" = "PKGBUILD" ] && continue
            [ "$basename" = ".SRCINFO" ] && continue
            [ "$basename" = ".gitignore" ] && continue
            [ "$basename" = "." ] && continue
            [ "$basename" = ".." ] && continue
            [ -f "$file" ] || continue
            assets="${assets}${file}"$'\n'
          done
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$assets" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Publish ${{ matrix.package }} to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: ${{ matrix.package }}
          pkgbuild: packages/${{ matrix.package }}/PKGBUILD
          assets: ${{ steps.assets.outputs.files }}
          commit_username: ${{ env.AUR_USERNAME }}
          commit_email: ${{ env.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: Automatic update from GitHub Actions
          ssh_keyscan_types: rsa,ecdsa,ed25519
