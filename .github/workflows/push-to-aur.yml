name: Push to AUR

on:
  workflow_dispatch:
    inputs:
      packages:
        description: '要推送的包名（留空推送所有包，逗号分隔）'
        required: false
        default: ''

permissions:
  contents: read

env:
  AUR_USERNAME: "github-actions[bot]"
  AUR_EMAIL: "github-actions[bot]@users.noreply.github.com"

jobs:
  setup:
    name: Setup matrix
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.set_matrix.outputs.packages }}
      count: ${{ steps.set_matrix.outputs.count }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set matrix
        id: set_matrix
        run: |
          if [ -n "${{ github.event.inputs.packages }}" ]; then
            packages=$(echo "${{ github.event.inputs.packages }}" | tr ',' '\n' | jq -R . | jq -s -c .)
          else
            UPDATED=()
            for pkg_path in packages/*/; do
              [ -d "$pkg_path" ] || continue
              UPDATED+=("$(basename "$pkg_path")")
            done
            if [ ${#UPDATED[@]} -eq 0 ]; then
              packages='[]'
            else
              packages=$(printf '%s\n' "${UPDATED[@]}" | jq -R . | jq -s -c .)
            fi
          fi

          echo "packages=$packages" >> "$GITHUB_OUTPUT"
          echo "count=$(echo "$packages" | jq 'length')" >> "$GITHUB_OUTPUT"

          echo "Packages to push:"
          echo "$packages" | jq -r '.[]' | sed 's/^/   - /'

          if [ "$packages" = "[]" ]; then
            echo "No packages to push, skipping."
          fi

  push-to-aur:
    name: Push ${{ matrix.package }}
    runs-on: ubuntu-latest
    needs: setup

    strategy:
      matrix:
        package: ${{ fromJson(needs.setup.outputs.packages) }}
      fail-fast: false
    if: needs.setup.outputs.count != '0'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Detect package assets
        id: assets
        run: |
          assets=""
          for file in packages/${{ matrix.package }}/*; do
            basename=$(basename "$file")
            [ "$basename" = "PKGBUILD" ] && continue
            [ "$basename" = ".gitignore" ] && continue
            [ -f "$file" ] || continue
            assets="${assets}${file}"$'\n'
          done
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$assets" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Publish ${{ matrix.package }} to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: ${{ matrix.package }}
          pkgbuild: packages/${{ matrix.package }}/PKGBUILD
          assets: ${{ steps.assets.outputs.files }}
          commit_username: ${{ env.AUR_USERNAME }}
          commit_email: ${{ env.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: Automatic update from GitHub Actions
          ssh_keyscan_types: rsa,ecdsa,ed25519
